  reference: "model.melting.parameters.extrusion.characteristic_magmatic_crust_height_max.value"
  value: 8000.0
  units: "m"
  type: "Float64"
  description: "Maximum reference value for the characteristic magmatic crust height in meters. When the calculated characteristic magmatic crust height is above this value the extrusion volume factor is set to the maximum value (i.e. `extrusion_volume_factor_max`)."
characteristic_magmatic_crust_height_min:
  name: "characteristic_magmatic_crust_height_min"
