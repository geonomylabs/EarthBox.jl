  units: "Degrees"
  shape: "20,50"
  type: "Matrix{Float64}"
  description: "`(ynum - 1, xnum - 1)` : Dilatation angle on pressure grid interpolated from markers in Degrees."
  min: 0.0
  max: 0.0
  mean: 0.0
dilatation_grid0:
  name: "dilatation_grid0"
