  reference: "model.melting.parameters.extrusion.characteristic_magmatic_crust_height.value"
  value: 0.0
  units: "m"
  type: "Float64"
  description: "Characteristic height of magmatic crust in meters calculated based on the total volume of magma produced during a given time step and the full extensional velocity. The characteristic magmatic crust height is the height of new crust that would be formed if all the melt in the mantle was extracted and emplaced at the top of the model in a column with a width equal to the full extension velocity times the time step."
