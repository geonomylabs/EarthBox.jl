  units: "Pa"
  shape: "20,50"
  type: "Matrix{Float64}"
  description: "`(ynum - 1, xnum - 1)` : Dual purpose array: First stores post-Stokes normal viscoelastic stress change (sxx2-sxx1) and then updated to final (remaining) normal stress change by subtracting relaxed grid nodal-marker stress differences (dsxxn) in Pa."
  min: 0.0
  max: 0.0
  mean: 0.0
dsxxn:
  name: "dsxxn"
  reference: "model.stokes_continuity.arrays.stress_change.dsxxn.array"
  units: "Pa"
  shape: "20,50"
  type: "Matrix{Float64}"
  description: "`(ynum - 1, xnum - 1)` : Subgrid nodal-marker normal stress change on basic grid interpolated from markers in Pa."
  min: 0.0
  max: 0.0
