dsxy:
  name: "dsxy"
  reference: "model.stokes_continuity.arrays.stress_change.dsxy.array"
  units: "Pa"
  shape: "21,51"
  type: "Matrix{Float64}"
  description: "`(ynum, xnum)` : Dual purpose array: First stores post-Stokes viscoelastic stress change (sxy2-sxy1) and then updated to final (remaining) shear stress change by subtracting relaxed grid nodal-marker stress differences (dsxyn) in Pa."
