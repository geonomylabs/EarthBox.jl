extraction_fraction:
  name: "extraction_fraction"
  reference: "model.melting.parameters.extraction.extraction_fraction.value"
  value: 1.0
  units: "fraction"
  type: "Float64"
  description: "Fraction of extracted melt that is extracted from the partially molten zone. The remaining melt is left in the partially molten zone and refertalizes the mantle."
extrusion_volume_factor:
  name: "extrusion_volume_factor"
  reference: "model.melting.parameters.extrusion.extrusion_volume_factor.value"
  value: 0.2
  units: "None"
  type: "Float64"
  description: "Minimum value for the extrusion volume factor. The volume of lava produced at the surface of the model is calculated as the product of the extrusion volume factor and the total volume of magma produced during a time step. The extrusion volume factor changes as a function of the characteristic magmatic crust height. The characteristic magmatic crust height is the height of new crust that would be formed if all the melt in the mantle was extracted and emplaced at the top of the model in a column with a width equal to the full extension velocity times the time step. This minimum value is used when the magmatic crust height is below the minimum characteristic magmatic crust height. A linear model is used to define the extrusion volume factor when the calculated magmatic crust height is between the minimum and maximum characteristic magmatic crust height."
extrusion_volume_factor_max:
  name: "extrusion_volume_factor_max"
  reference: "model.melting.parameters.extrusion.extrusion_volume_factor_max.value"
  value: 0.2
  units: "None"
  type: "Float64"
  description: "Maximum value for the extrusion volume factor. This maximum value is reached when the characteristic magmatic crust height is equal to the maximum characteristic magmatic crust height."
