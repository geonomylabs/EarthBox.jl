RC1:
  name: "RC1"
  reference: "model.stokes_continuity.arrays.rhs.RC1.array"
  units: ""
  shape: "20,50"
  type: "Matrix{Float64}"
  description: "`(ynum - 1, xnum - 1)` : Right-hand side values on pressure grid for continuity equation."
  min: 0.0
  max: 0.0
  mean: 0.0
RHS:
  name: "RHS"
  reference: "model.stokes_continuity.arrays.rhs.RHS.array"
  units: ""
  shape: "3000"
  type: "Vector{Float64}"
  description: "Discretized right-hand side array for Stokes-continuity equation"
  min: 0.0
  max: 0.0
  mean: 0.0
RHSheat:
  name: "RHSheat"
  reference: "model.heat_equation.arrays.rhs.RHSheat.array"
  units: "K"
  shape: "1071"
  type: "Vector{Float64}"
  description: "`(ynum*xnum)` : Right-hand side array for heat equation."
  min: 0.0
  max: 0.0
  mean: 0.0
RT1:
  name: "RT1"
  reference: "model.heat_equation.arrays.rhs.RT1.array"
  units: "None"
  shape: "21,51"
  type: "Matrix{Float64}"
  description: "`(ynum, xnum)` : Right-hand side values at grid node locations."
  min: 0.0
  max: 0.0
  mean: 0.0
RX1:
  name: "RX1"
  reference: "model.stokes_continuity.arrays.rhs.RX1.array"
  units: "m/s or Pa"
  shape: "22,51"
  type: "Matrix{Float64}"
  description: "`(ynum + 1, xnum)` : Right-hand side values on vx grid for x-Stokes equation."
  min: 0.0
  max: 0.0
  mean: 0.0
RY1:
  name: "RY1"
  reference: "model.stokes_continuity.arrays.rhs.RY1.array"
  units: "m/s or Pa"
  shape: "21,52"
  type: "Matrix{Float64}"
  description: "`(ynum, xnum + 1)` : Right-hand side values on vy grid for y-Stokes equation."
  min: 0.0
  max: 0.0
  mean: 0.0
avg_shallow_partial_melt_xcoors:
  name: "avg_shallow_partial_melt_xcoors"
  reference: "model.melting.arrays.extraction.avg_shallow_partial_melt_xcoors.array"
  units: "m"
  shape: "100"
  type: "Vector{Float64}"
  description: "`(nmax_basin)` : Average x-coordinates of the shallowest partial melt marker in drainage basins in meters."
  min: 0.0
  max: 0.0
  mean: 0.0
avg_shallow_partial_melt_ycoors:
  name: "avg_shallow_partial_melt_ycoors"
  reference: "model.melting.arrays.extraction.avg_shallow_partial_melt_ycoors.array"
  units: "m"
  shape: "100"
  type: "Vector{Float64}"
  description: "`(nmax_basin)` : Average y-coordinates of the shallowest partial melt marker in drainage basins in meters."
  min: 0.0
  max: 0.0
  mean: 0.0
bback:
  name: "bback"
  reference: "model.bcs.arrays.velocity.bback.array"
  units: "m/s"
  shape: "22,6"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 6)` : Velocity boundary conditions along back boundary: 
    	 vx[i,j,znum+1] = bback[i,1] + vx[i,j,znum]*bback[i,2] 
    	 vy[i,j,znum+1] = bback[i,3] + vy[i,j,znum]*bback[i,4] 
    	 vz[i,j,znum  ] = bback[i,5] + vz[i,j,znum-1]*bback[i,6]
  min: 0.0
  max: 0.0
  mean: 0.0
bbackx:
  name: "bbackx"
  reference: "model.bcs.arrays.vel_comp.bbackx.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vx boundary condition along back boundary: 
    	 vx[i,j,znum+1] = bbackx[i,j,1] + vx[i,j,znum]*bbackx[i,j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bbacky:
  name: "bbacky"
  reference: "model.bcs.arrays.vel_comp.bbacky.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vy boundary condition along back boundary: 
    	 vy[i,j,znum+1] = bbacky[i,j,1] + vy[i,j,znum]*bbacky[i,j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bbackz:
  name: "bbackz"
  reference: "model.bcs.arrays.vel_comp.bbackz.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vz boundary condition along back boundary: 
    	 vz[i,j,znum  ] = bbackz[i,j,1] + vz[i,j,znum-1]*bbackz[i,j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bbottom:
  name: "bbottom"
  reference: "model.bcs.arrays.velocity.bbottom.array"
  units: "m/s"
  shape: "52,6"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 6)` : Velocity boundary conditions along bottom boundary: 
    	 vx[ynum+1,j,:] = bbottom[j,1] + vx[ynum  ,j,:]*bbottom[j,2] 
    	 vy[ynum  ,j,:] = bbottom[j,3] + vy[ynum-1,j,:]*bbottom[j,4] 
    	 vz[ynum+1,j,:] = bbottom[j,5] + vz[ynum  ,j,:]*bbottom[j,6]
  min: 0.0
  max: 1.0
  mean: 0.3333333333333333
bbottomt:
  name: "bbottomt"
  reference: "model.bcs.arrays.temperature.bbottomt.array"
  units: "K"
  shape: "51,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum, 2)` : Temperature boundary condition along bottom boundary: 
    	 tk[ynum][j] = bbottomt[j][1] + tk[ynum-1][j]*bbottomt[j][2]
  min: 0.0
  max: 273.0
  mean: 136.5
bbottomx:
  name: "bbottomx"
  reference: "model.bcs.arrays.vel_comp.bbottomx.array"
  units: "m/s"
  shape: "52,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 2)` : Vx boundary condition along bottom boundary: 
    	 vx[ynum+1,j,:] = bbottomx[j,1] + vx[ynum, j,:]*bbottomx[j,2]
  min: 0.0
  max: 1.0
  mean: 0.5
bbottomy:
  name: "bbottomy"
  reference: "model.bcs.arrays.vel_comp.bbottomy.array"
  units: "m/s"
  shape: "52,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 2)` : Vy along bottom boundary: 
    	 vy[ynum,j,:] = bbottomy[j,1] + vy[ynum-1, j,:]*bbottomy[j,2]
  min: 0.0
  max: 1.0
  mean: 0.5
bbottomz:
  name: "bbottomz"
  reference: "model.bcs.arrays.vel_comp.bbottomz.array"
  units: "m/s"
  shape: "52,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 2)` : Vz boundary condition along bottom boundary: 
    	 vz[ynum+1,j,:] = bbottomz[j,1] + vz[ynum, j,:]*bbottomz[j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bfront:
  name: "bfront"
  reference: "model.bcs.arrays.velocity.bfront.array"
  units: "m/s"
  shape: "22,6"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 6)` : Velocity boundary conditions along front boundary: 
    	 vx[i,j,1] = bfront[i,1] + vx[i,j,2]*bfront[i,2] 
    	 vy[i,j,1] = bfront[i,3] + vy[i,j,2]*bfront[i,4] 
    	 vz[i,j,1] = bfront[i,5] + vz[i,j,2]*bfront[i,6]
  min: 0.0
  max: 0.0
  mean: 0.0
bfrontx:
  name: "bfrontx"
  reference: "model.bcs.arrays.vel_comp.bfrontx.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vx boundary condition along front boundary: 
    	 vx[i,j,1] = bfrontx[i,j,1] + vx[i,j,2]*bfrontx[i,j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bfronty:
  name: "bfronty"
  reference: "model.bcs.arrays.vel_comp.bfronty.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vy boundary condition along front boundary: 
    	 vy[i,j,1] = bfronty[i,j,1] + vy[i,j,2]*bfronty[i,j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bfrontz:
  name: "bfrontz"
  reference: "model.bcs.arrays.vel_comp.bfrontz.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vz boundary condition along front boundary: 
    	 vz[i,j,1] = bfrontz[i,j,1] + vz[i,j,2]*bfrontz[i,j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bintern_velocity:
  name: "bintern_velocity"
  reference: "model.bcs.arrays.internal.bintern_velocity.array"
  units: "NA"
  shape: "8"
  type: "Vector{Float64}"
  description:
    - "1: (not used)"
    - "2: (not used)"
    - "3: (not used)"
    - "4: Prescribed x-velocity, m/s"
    - "5: (not used)"
    - "6: (not used)"
    - "7: (not used)"
    - "8: Prescribed y-velocity, m/s"
  min: 0.0
  max: 0.0
  mean: 0.0
bintern_zone:
  name: "bintern_zone"
  reference: "model.bcs.arrays.internal.bintern_zone.array"
  units: "NA"
  shape: "8"
  type: "Vector{Int64}"
  description:
    - "1: Horizontal position of vx nodes with prescribed velocity [no such condition if negative]"
    - "2: Min vertical position"
    - "3: Max vertical position"
    - "4: (not used)"
    - "5: Horizontal position of vy nodes with prescribed velocity [no such condition if negative]"
    - "6: Min vertical position"
    - "7: Max vertical position"
    - "8: (not used)"
  min: -1
  max: -1
  mean: -1.0
bleft:
  name: "bleft"
  reference: "model.bcs.arrays.velocity.bleft.array"
  units: "m/s"
  shape: "22,6"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 6)` : Velocity boundary conditions along left boundary: 
    	 vx[i,1,:] = bleft[i,1] + vx[i,2,:]*bleft[i,2] 
    	 vy[i,1,:] = bleft[i,3] + vy[i,2,:]*bleft[i,4] 
    	 vz[i,1,:] = bleft[i,5] + vz[i,2,:]*bleft[i,6]
  min: -1.0
  max: 0.0
  mean: -0.16666666666666666
bleftt:
  name: "bleftt"
  reference: "model.bcs.arrays.temperature.bleftt.array"
  units: "K"
  shape: "21,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum, 2)` : Temperature boundary condition along left boundary: 
    	 tk[i][1] = bleftt[i][1] + bleftt[i][2]*tk[i][2]
  min: 0.0
  max: 1.0
  mean: 0.5
bleftx:
  name: "bleftx"
  reference: "model.bcs.arrays.vel_comp.bleftx.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vx boundary condition along left boundary: 
    	 vx[i,1] = bleftx[i,1] + vx[i, 2]*bleftx[i,2]
  min: 0.0
  max: 0.0
  mean: 0.0
blefty:
  name: "blefty"
  reference: "model.bcs.arrays.vel_comp.blefty.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vy boundary condition along left boundary: 
    	 vy[i,1] = blefty[i,1] + vy[i, 2]*blefty[i,2]
  min: -1.0
  max: 0.0
  mean: -0.5
bleftz:
  name: "bleftz"
  reference: "model.bcs.arrays.vel_comp.bleftz.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vz boundary condition along left boundary: 
    	 vz[i,1,:] = bleftz[i,1] + vz[i,2,:]*bleftz[i,2]
  min: 0.0
  max: 0.0
  mean: 0.0
bright:
  name: "bright"
  reference: "model.bcs.arrays.velocity.bright.array"
  units: "m/s"
  shape: "22,6"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 6)` : Velocity boundary conditions along right boundary: 
    	 vx[i,xnum  ,:] = bright[i,1] + vx[i,xnum-1,:]*bright[i,2] 
    	 vy[i,xnum+1,:] = bright[i,3] + vy[i,xnum  ,:]*bright[i,4] 
    	 vz[i,xnum+1,:] = bright[i,5] + vz[i,xnum  ,:]*bright[i,6]
  min: -1.0
  max: 0.0
  mean: -0.16666666666666666
brightt:
  name: "brightt"
  reference: "model.bcs.arrays.temperature.brightt.array"
  units: "K"
  shape: "21,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum, 2)` : Temperature boundary condition along right boundary: 
    	 tk[i][xnum] = brightt[i][1] + brightt[i][2]*tk[i][xnum-1]
  min: 0.0
  max: 1.0
  mean: 0.5
brightx:
  name: "brightx"
  reference: "model.bcs.arrays.vel_comp.brightx.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vx boundary condition along right boundary: 
    	 vx[i,xnum] = brightx[i, 1] + vx[i, xnum-1]*brightx[i,2]
  min: 0.0
  max: 0.0
  mean: 0.0
brighty:
  name: "brighty"
  reference: "model.bcs.arrays.vel_comp.brighty.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vy boundary condition along right boundary: 
    	 vy[i,xnum+1] = brighty[i,1] + vx[i, xnum]*brighty[i,2]
  min: -1.0
  max: 0.0
  mean: -0.5
brightz:
  name: "brightz"
  reference: "model.bcs.arrays.vel_comp.brightz.array"
  units: "m/s"
  shape: "22,2"
  type: "Matrix{Float64}"
  description: |-
    `(ynum+1, 2)` : Vz boundary condition along right boundary: 
    	 vz[i,xnum+1,:] = brightz[i,1] + vz[i,xnum,:]*brightz[i,2]
  min: 0.0
  max: 0.0
  mean: 0.0
btop:
  name: "btop"
  reference: "model.bcs.arrays.velocity.btop.array"
  units: "m/s"
  shape: "52,6"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 6)` : Velocity boundary conditions along top boundary: 
    	 vx[1,j,:] = btop[j,1] + vx[2,j,:]*btop[j,2] 
    	 vy[1,j,:] = btop[j,3] + vy[2,j,:]*btop[j,4] 
    	 vz[1,j,:] = btop[j,5] + vz[2,j,:]*btop[j,6]
  min: 0.0
  max: 1.0
  mean: 0.3333333333333333
btopt:
  name: "btopt"
  reference: "model.bcs.arrays.temperature.btopt.array"
  units: "K"
  shape: "51,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum, 2)` : Temperature boundary condition along top boundary: 
    	 tk[1][j] = btopt[j][1] + tk[2][j]*btop[j][2]
  min: 0.0
  max: 273.0
  mean: 136.5
btopx:
  name: "btopx"
  reference: "model.bcs.arrays.vel_comp.btopx.array"
  units: "m/s"
  shape: "52,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 2)` : Vx boundary condition along top boundary: 
    	 vx[1,j,:] = btopx[j,1] + vx[2,j,:]*btopx[j,2]
  min: 0.0
  max: 1.0
  mean: 0.5
btopy:
  name: "btopy"
  reference: "model.bcs.arrays.vel_comp.btopy.array"
  units: "m/s"
  shape: "52,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 2)` : Vy boundary condition along top boundary: 
    	 vy[1,j,:] = btopy[j,1] + vy[2,j,:]*btopy[j,2]
  min: 0.0
  max: 1.0
  mean: 0.5
btopz:
  name: "btopz"
  reference: "model.bcs.arrays.vel_comp.btopz.array"
  units: "m/s"
  shape: "52,2"
  type: "Matrix{Float64}"
  description: |-
    `(xnum+1, 2)` : Vz boundary condition along top boundary: 
    	 vz[1,j,:] = btopz[j,1] + vz[2,j,:]*btopz[j,2]
  min: 0.0
  max: 0.0
  mean: 0.0
cohesion_grid:
  name: "cohesion_grid"
  reference: "model.stokes_continuity.arrays.plastic_def.cohesion_grid.array"
  units: "Pa"
  shape: "21,51"
  type: "Matrix{Float64}"
  description: "`(ynum, xnum)` : Cohesion on basic grid interpolated from markers in Pa."
  min: 0.0
  max: 0.0
  mean: 0.0
cohesion_grid0:
  name: "cohesion_grid0"
  reference: "model.stokes_continuity.arrays.plastic_def.cohesion_grid0.array"
  units: "Pa"
  shape: "21,51"
  type: "Matrix{Float64}"
  description: "`(ynum, xnum)` : Backup of cohesion on basic grid interpolated from markers in Pa."
  min: 0.0
  max: 0.0
  mean: 0.0
dilatation_grid:
  name: "dilatation_grid"
